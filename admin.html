<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Quản Trị - Admin Panel</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 { color: #333; border-bottom: 2px solid #28a745; padding-bottom: 10px; }
        .section { margin-bottom: 40px; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
            font-size: 14px;
        }
        th { background-color: #f8f9fa; font-weight: bold; }
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }
        .btn-edit { background-color: #007bff; color: white; }
        .btn-edit:hover { background-color: #0056b3; }
        /* Form đăng nhập admin */
        .login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 320px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- KHUNG ĐĂNG NHẬP ADMIN -->
<div id="adminLogin" class="login-overlay">
    <div class="login-box">
        <h3 style="text-align: center; margin-top: 0;">Đăng Nhập Admin</h3>
        <input type="password" id="adminPassword" placeholder="Nhập mật khẩu Admin" style="width:100%; padding:10px; margin-bottom:15px; box-sizing:border-box;"><br>
        <button onclick="loginAdmin()" style="width:100%; padding:10px; background:#28a745; color:white; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">Xác Nhận</button>
    </div>
</div>

<!-- GIAO DIỆN QUẢN TRỊ CHÍNH -->
<div id="adminContent" class="admin-container hidden">
    <h2>HỆ THỐNG QUẢN TRỊ ADMIN</h2>
    
    <!-- Quản lý thành viên -->
    <div class="section">
        <h3>👥 Danh Sách Thành Viên & Số Dư</h3>
        <table id="usersTable">
            <thead>
                <tr>
                    <th>Số điện thoại</th>
                    <th>Mật khẩu</th>
                    <th>Số dư hiện tại</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <!-- Dữ liệu tự động nạp ở đây -->
            </tbody>
        </table>
    </div>

    <!-- Quản lý giao dịch -->
    <div class="section">
        <h3>📋 Lịch Sử Toàn Bộ Giao Dịch</h3>
        <table id="txTable">
            <thead>
                <tr>
                    <th>Mã GD</th>
                    <th>Tài khoản</th>
                    <th>Chủ thẻ</th>
                    <th>Ngân hàng</th>
                    <th>Số tài khoản</th>
                    <th>Số tiền</th>
                    <th>Trạng thái</th>
                </tr>
            </thead>
            <tbody>
                <!-- Dữ liệu tự động nạp ở đây -->
            </tbody>
        </table>
    </div>
</div>

<script>
// ⚠️ THAY LINK FIREBASE CỦA BẠN VÀO ĐÂY
const firebaseURL = "https://webo-7939c-default-rtdb.asia-southeast1.firebasedatabase.app";

// Bạn có thể tự đổi mật khẩu admin tại đây
const ADMIN_KEY = "admin123456"; 

function loginAdmin() {
    const pass = document.getElementById('adminPassword').value;
    if (pass === ADMIN_KEY) {
        document.getElementById('adminLogin').classList.add('hidden');
        document.getElementById('adminContent').classList.remove('hidden');
        loadAdminData();
    } else {
        alert('Mật khẩu Admin không chính xác!');
    }
}

function loadAdminData() {
    // 1. Tải danh sách thành viên
    fetch(`${firebaseURL}/users.json`)
    .then(res => res.json())
    .then(users => {
        const tbody = document.querySelector('#usersTable tbody');
        tbody.innerHTML = '';
        if(!users) return;

        Object.keys(users).forEach(phone => {
            const user = users[phone];
            tbody.innerHTML += `
                <tr>
                    <td><b>${phone}</b></td>
                    <td>${user.password}</td>
                    <td><b style="color:#28a745;">${Number(user.balance).toLocaleString('vi-VN')}đ</b></td>
                    <td>
                        <button class="btn btn-edit" onclick="adjustBalance('${phone}', ${user.balance})">✍️ Cộng/Trừ Tiền</button>
                    </td>
                </tr>
            `;
        });
    });

    // 2. Tải danh sách tất cả giao dịch
    fetch(`${firebaseURL}/transactions.json`)
    .then(res => res.json())
    .then(txs => {
        const tbody = document.querySelector('#txTable tbody');
        tbody.innerHTML = '';
        if(!txs) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">Chưa có giao dịch nào</td></tr>';
            return;
        }

        Object.keys(txs).reverse().forEach(id => {
            const tx = txs[id];
            let statusBadge = `<span style="color:#ffc107; font-weight:bold;">Chờ duyệt ⏳</span>`;
            if(tx.status === 'approved') statusBadge = `<span style="color:#28a745; font-weight:bold;">Thành công ✅</span>`;
            if(tx.status === 'rejected') statusBadge = `<span style="color:#dc3545; font-weight:bold;">Từ chối ❌</span>`;

            tbody.innerHTML += `
                <tr>
                    <td><code>${id}</code></td>
                    <td>${tx.username}</td>
                    <td>${tx.fullname}</td>
                    <td>${tx.bank}</td>
                    <td><code>${tx.accountNumber}</code></td>
                    <td><b>${Number(tx.amount).toLocaleString('vi-VN')}đ</b></td>
                    <td>${statusBadge}</td>
                </tr>
            `;
        });
    });
}

// Hàm cộng trừ tiền thủ công cho thành viên
function adjustBalance(phone, currentBalance) {
    const input = prompt(`Số dư hiện tại của ${phone} là: ${currentBalance.toLocaleString('vi-VN')}đ\nNhập số tiền muốn thay đổi (Ví dụ nhập 50000 để cộng thêm 50k, nhập -20000 để trừ đi 20k):`);
    if (input === null) return;
    
    const change = Number(input);
    if (isNaN(change)) {
        alert('Vui lòng nhập số hợp lệ!');
        return;
    }

    const newBalance = currentBalance + change;
    if (newBalance < 0) {
        alert('Lỗi: Số dư tài khoản không thể nhỏ hơn 0đ!');
        return;
    }

    fetch(`${firebaseURL}/users/${phone}.json`, {
        method: 'PATCH',
        body: JSON.stringify({ balance: newBalance })
    })
    .then(() => {
        alert(`Đã cập nhật số dư mới cho ${phone}: ${newBalance.toLocaleString('vi-VN')}đ`);
        loadAdminData(); // Tải lại danh sách
    })
    .catch(err => alert('Lỗi không thể cập nhật!'));
}
</script>
</body>
</html>
